<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupportPilot AI</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/tickets.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/buttons.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/forms.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/badges.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}">
</head>

<body>

<div class="app-layout">

    <!-- ================= SIDEBAR ================= -->

    <aside class="sidebar">

        <div class="sidebar-logo">

    <h2>SupportPilot AI</h2>

    <p>Enterprise CRM Platform</p>

</div>
<nav>

    <button class="active" onclick="loadDashboard()">
        🏠 Dashboard
    </button>

    <button>
        🎫 Tickets
    </button>

    <button onclick="loadCustomers()">
        👥 Customers
    </button>

    <button>
        🤖 AI Assistant
    </button>

    <button>
        📚 Knowledge Base
    </button>

    <button>
        📈 Analytics
    </button>

    <button>
        ⚙ Settings
    </button>

</nav>
<div class="sidebar-footer">

    <div class="sidebar-user">

        <div class="user-avatar">

            P

        </div>

        <div class="user-info">

            <h4>Pranto Dey</h4>

            <p>Administrator</p>

        </div>

    </div>

</div>
    </aside>

    <!-- ================= MAIN ================= -->

    <main class="main-content">

        <div class="container">

    <!-- Dashboard Header -->

    <div class="dashboard-header">

        <div class="dashboard-title">

            <h1>Good Evening, Pranto 👋</h1>

            <p>Customer Experience Center</p>

        </div>

        <div class="dashboard-right">

            <input
                class="search-box"
                type="text"
                placeholder="🔍 Search tickets...">

            <button class="notification-btn">

                🔔

            </button>

            <div class="profile-card">

                👤 Admin

            </div>

        </div>

    </div>

    <hr>

            <div class="ticket-form-card">

    <div class="form-title">

        ✨ Create Support Ticket

    </div>

    <div class="form-grid">

        <div class="form-group">

            <label>Customer Name</label>

            <input
            type="text"
            id="customer_name"
            placeholder="John Smith">

        </div>

        <div class="form-group">

            <label>Email Address</label>

            <input
            type="email"
            id="email"
            placeholder="john@email.com">

        </div>

        <div class="form-group">

            <label>Company</label>

            <input
            type="text"
            id="company"
            placeholder="ABC Logistics">

        </div>

        <div class="form-group">

            <label>Priority</label>

            <select id="priority">

                <option>Low</option>
                <option selected>Medium</option>
                <option>High</option>
                <option>Critical</option>

            </select>

        </div>

    </div>

    <div class="form-group">

        <label>Customer Issue</label>

        <textarea
        id="message"
        rows="7"
        placeholder="Describe the customer's issue..."></textarea>

    </div>

    <div class="form-buttons">

        <button
        class="primary-btn"
        onclick="sendMessage()">

            Create Ticket

        </button>

        <button
        class="secondary-btn"
        onclick="loadDashboard()">

            Refresh Dashboard

        </button>

    </div>

</div>

<hr>

<div class="toolbar">

    <input
        id="searchTicket"
        class="search-box"
        placeholder="🔍 Search customer, company or issue..."
        onkeyup="loadDashboard()">

    <select
        id="statusFilter"
        onchange="loadDashboard()">

        <option>All Status</option>
        <option>Open</option>
        <option>In Progress</option>
        <option>Closed</option>

    </select>

    <select
        id="priorityFilter"
        onchange="loadDashboard()">

        <option>All Priority</option>
        <option>Critical</option>
        <option>High</option>
        <option>Medium</option>
        <option>Low</option>

    </select>

</div>

<div id="dashboard"></div>

            

        </div>

    </main>

</div>

<script src="/static/script.js"></script>

</body>
</html>
